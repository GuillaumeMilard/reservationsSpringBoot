<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.mx/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
    <head>
        <title>Création d'un artiste</title>
        <style> .fieldError { color: red; } </style>
        <link rel="stylesheet" type="text/css" href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css">
    </head>
    <body>
        <div class="container">
            <div layout:fragment="content">
                <h2>Nouvel artiste</h2>
                <form th:action="@{/artists/create}" th:object="${artist}" method="post">
                    <div>
                        <label>Firstname:</label>
                        <input type="text" th:field="*{firstname}">
                        <p th:if="${#fields.hasErrors('firstname')}"
                           th:errors="*{firstname}" th:errorclass="fieldError"></p>
                    </div>
                    <div>
                        <label>Lastname:</label>
                        <input type="text" th:field="*{lastname}">
                        <p th:if="${#fields.hasErrors('lastname')}"
                           th:errors="*{lastname}" th:errorclass="fieldError"></p>
                    </div>
                    <div>
                        <button type="submit" th:text="Ajouter">Ajouter</button>
                        <a th:href="@{/artists}">Annuler</a>
                    </div>
                </form>
                <nav><a th:href="@{/artists}">Retour à l'index</a></nav>
            </div>
        </div>
        <script src="/webjars/bootstrap/5.2.3/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
