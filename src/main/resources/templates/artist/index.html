<!DOCTYPE html>
<!-- layout:decorate indique que le template indexPage.html héritera du layout main.html -->
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.mx/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
        <!--  -->
    <head> <!--Titre de l’en-tête de page HTML  -->
        <meta charset="UTF-8">
        <title>Liste des artistes</title>
        <!-- Utilisation de Bootstrap avec le webjar dans pom.xml -->
        <link rel="stylesheet" type="text/css" href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css">
    </head>
    <body>
        <!-- layout:fragment="content" présente la partie de code HTML qui est injectée dans layout/main -->
        <div layout:fragment="content">
             <div class="container">
                 <div class="card">
                     <div class="card-header"> <h1 th:text="${title}"></h1></div>
                     <div class="card-body">
                         <table class="table" th:unless="${#lists.isEmpty(artists)}">
                             <thead>
                                 <tr>
                                     <th>ID</th>
                                     <th>Firstname</th>
                                     <th>Lastname</th>
                                 </tr>
                             </thead>
                             <tbody>
                                 <tr th:each="artist : ${artists}">
                                     <td th:text="${artist.id}">id</td>
                                     <td th:text="${artist.firstname}">Bob</td>
                                     <td><a th:text="${artist.lastname}"
                                            th:href="@{/artists/{id}(id=${artist.id})}">Sull</a></td>
                                 </tr>
                             </tbody>
                         </table>
                     </div>
                 </div>
            </div>
        </div>
        <script src="/webjars/bootstrap/5.2.3/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
