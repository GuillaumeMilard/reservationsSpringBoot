<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Liste des localités </title>
        <Link rel="stylesheet" href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css">"
    </head>
    <body>
        <h2> Liste des localités </h2>
    <table>
        <thead>
        <tr>
            <th>ID</th> <th>Postal_code</th> <th>Localityname</th>
        </tr>
        <tr th:each="Locality:${localitiesList}">
            <td th:text="${Locality.id}"></td>
            <td th:text="${Locality.postal_coded}"></td>
            <td th:text="${Locality.localityname}"></td>
        </tr>
        </thead>
    </table>
    </body>
</html>
